# Extract audio
-x

# Format to mp3
--audio-format mp3

# Best audio quality
--audio-quality 0

# Show progress while downloading
--progress
--newline

# Don't stop download process if a song is in the archive
--no-break-on-existing

# Adjust metadata to add only the first artist
--parse-metadata %(artists.0)s:%(meta_artist)s

# Embeds the metadata from downloaded to the mp3
--embed-metadata

# Embed the thumbnail as album art
--embed-thumbnail

# Strip junk tags (description, comment, synopsis, source url)
# --postprocessor-args ffmpeg_o:-metadata comment= -metadata description= -metadata synopsis= -metadata purl=

# Set the thumbnail to square ratio
--ppa EmbedThumbnail+ffmpeg_o:-c:v mjpeg -vf crop='if(gt(ih,iw),iw,ih)':'if(gt(iw,ih),ih,iw)'
